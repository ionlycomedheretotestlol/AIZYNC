<style>
/* ═══════════════════════════════════════════
   GOOGLE SUCCESS NOTIFICATION
═══════════════════════════════════════════ */
#google-success-star {
  position: fixed; bottom: 24px; right: 24px;
  width: 60px; height: 60px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: conic-gradient(
    #4285F4 0deg,
    #EA4335 90deg,
    #FBBC04 180deg,
    #34A853 270deg,
    #4285F4 360deg
  );
  box-shadow: 0 0 20px rgba(66,133,244,0.4), 0 8px 24px rgba(0,0,0,0.3);
  z-index: 500;
  animation: google-star-pop 0.4s cubic-bezier(0.34,1.56,0.64,1), google-star-glow 2s ease-in-out infinite;
  opacity: 0; pointer-events: none;
}

#google-success-star.visible {
  opacity: 1;
  pointer-events: all;
}

#google-success-star.hiding {
  animation: google-star-fade-out 0.3s ease-out forwards;
}

@keyframes google-star-pop {
  from {
    opacity: 0;
    transform: scale(0.3) translateY(20px);
  }
  to {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
}

@keyframes google-star-glow {
  0%, 100% {
    box-shadow: 0 0 20px rgba(66,133,244,0.4), 0 8px 24px rgba(0,0,0,0.3);
  }
  50% {
    box-shadow: 0 0 40px rgba(66,133,244,0.7), 0 8px 32px rgba(0,0,0,0.5);
  }
}

@keyframes google-star-fade-out {
  to {
    opacity: 0;
    transform: scale(0.7) translateY(10px);
  }
}

#google-success-star svg {
  width: 32px; height: 32px;
  animation: google-icon-spin 3s linear infinite;
}

@keyframes google-icon-spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
</style>
<body>
<!-- Google Success Notification -->
<div id="google-success-star">
  <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC04"/>
    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
  </svg>
</div>
<script>
// Check for successful Google connection after page refresh
function checkGoogleConnectionSuccess() {
  const googleConnected = sessionStorage.getItem('google_just_connected') || 
                         localStorage.getItem('google_just_connected');
  
  if (googleConnected) {
    sessionStorage.removeItem('google_just_connected');
    localStorage.removeItem('google_just_connected');
    showGoogleSuccessNotification();
  }
}

function showGoogleSuccessNotification() {
  const star = document.getElementById('google-success-star');
  if (!star) return;
  
  star.classList.add('visible');
  star.classList.remove('hiding');
  
  setTimeout(() => {
    star.classList.add('hiding');
    star.classList.remove('visible');
  }, 4000);
}

document.addEventListener('DOMContentLoaded', checkGoogleConnectionSuccess);
</script>
